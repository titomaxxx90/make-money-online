<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Blue Velvet</title>
    <style>
        /* Убираем лишние отступы */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #000414; /* Запасной фон, чтобы не было белого экрана */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .premium-velvet {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* 1. Глубокая база */
            background-color: #000414; 
            
            /* 2. Наслоение градиентов и исправленный SVG */
            background-image: 
                /* Интерактивный блик (зависит от JS переменных) */
                radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(50, 80, 220, 0.3) 0%, transparent 50%),
                /* Статичные пятна ворса */
                radial-gradient(circle at 15% 15%, rgba(30, 60, 150, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(20, 40, 100, 0.3) 0%, transparent 45%),
                /* Текстура ворса (экранированный SVG) */
                url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");

            background-blend-mode: screen, soft-light, overlay, soft-light;
            background-attachment: fixed;
            
            /* Анимация медленного «дыхания» ткани */
            animation: velvet-shimmer 20s ease-in-out infinite alternate;
            transition: background-position 0.2s ease-out;
        }

        @keyframes velvet-shimmer {
            0% { background-position: 0% 0%, 5% 5%, 95% 95%, 0% 0%; }
            100% { background-position: 0% 0%, 10% 10%, 90% 90%, 0% 0%; }
        }

        /* Текст для контраста */
        .content {
            text-align: center;
            color: #d1d5db;
            z-index: 2;
        }

        h1 {
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            margin: 0;
        }

        p {
            opacity: 0.7;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="premium-velvet">
        <div class="content">
            <h1>Royal Velvet</h1>
            <p>Поводите мышкой, чтобы ощутить текстуру</p>
        </div>
    </div>

    <script>
        // Ждем полной загрузки DOM
        document.addEventListener('DOMContentLoaded', () => {
            const velvet = document.querySelector('.premium-velvet');
            
            if (velvet) {
                window.addEventListener('mousemove', e => {
                    // Рассчитываем положение курсора в процентах относительно окна
                    const x = (e.clientX / window.innerWidth) * 100;
                    const y = (e.clientY / window.innerHeight) * 100;
                    
                    // Передаем значения в CSS переменные
                    velvet.style.setProperty('--mouse-x', x + '%');
                    velvet.style.setProperty('--mouse-y', y + '%');
                });
            } else {
                console.error("Элемент .premium-velvet не найден!");
            }
        });
    </script>

</body>
</html>
